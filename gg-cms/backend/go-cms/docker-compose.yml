version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: go-cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: go_cms_user
      POSTGRES_PASSWORD: go_cms_pass
      POSTGRES_DB: go_cms
    ports:
      - "5433:5432"   # host:5433 → container:5432 (avoids conflict with other postgres instances)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/postgres/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U go_cms_user -d go_cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: go-cms-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: go_cms_user
      MONGO_INITDB_ROOT_PASSWORD: go_cms_pass
      MONGO_INITDB_DATABASE: go_cms
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for DB inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: go-cms-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@serenya.com
      PGADMIN_DEFAULT_PASSWORD: Admin@123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
  mongo_data:
