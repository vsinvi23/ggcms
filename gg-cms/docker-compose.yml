version: "3.9"

# Full-stack GeekGully CMS
# Usage:
#   docker compose up -d
#   docker compose --profile tools up -d   (adds pgAdmin)
#
# Required env vars (set in a .env file or export before running):
#   ADMIN_PASSWORD, JWT_SECRET, VITE_API_BASE_URL

services:
  # ── Databases ────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: go_cms_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-go_cms_pass}
      POSTGRES_DB: go_cms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U go_cms_user -d go_cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: go_cms_user
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-go_cms_pass}
      MONGO_INITDB_DATABASE: go_cms
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend/go-cms
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      GIN_MODE: release
      LOG_LEVEL: info

      DB_WRITE_URL: postgres://go_cms_user:${POSTGRES_PASSWORD:-go_cms_pass}@postgres:5432/go_cms?sslmode=disable
      DB_READ_URL: ""

      MONGO_URI: mongodb://go_cms_user:${MONGO_PASSWORD:-go_cms_pass}@mongodb:27017/?authSource=admin
      MONGO_DATABASE: go_cms

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: "24"

      UPLOAD_DIR: /app/uploads
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-http://localhost:8080/uploads}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}

      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@geekgully.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Frontend ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend/react-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
        VITE_APP_NAME: GeekGully
        VITE_APP_ENV: production
        VITE_ENABLE_REGISTRATION: "true"
        VITE_ENABLE_SOCIAL_LOGIN: "false"
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # ── Optional tools ────────────────────────────────────────────────────────────

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@geekgully.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-Admin@123}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
  mongo_data:
  uploads_data:
