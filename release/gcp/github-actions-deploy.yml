# GG-CMS — GitHub Actions CI/CD (alternative to Cloud Build)
#
# Triggers on push to main branch.
# Free for public repos; private repos get 2000 min/month on free tier.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GCP_PROJECT_ID          your GCP project ID
#   GCP_SA_KEY              service account JSON key (base64 encoded)
#   FIREBASE_TOKEN          firebase login:ci token
#   CLOUDRUN_DB_WRITE_URL   postgres URL with internal VM IP
#   CLOUDRUN_MONGO_URI      mongodb URI with internal VM IP
#
# Setup service account:
#   gcloud iam service-accounts create github-deploy \
#     --display-name="GitHub Actions Deploy"
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member=serviceAccount:github-deploy@$PROJECT_ID.iam.gserviceaccount.com \
#     --role=roles/run.admin
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member=serviceAccount:github-deploy@$PROJECT_ID.iam.gserviceaccount.com \
#     --role=roles/artifactregistry.writer
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member=serviceAccount:github-deploy@$PROJECT_ID.iam.gserviceaccount.com \
#     --role=roles/iam.serviceAccountUser

name: Deploy GG-CMS to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: us-central1
  BACKEND_IMAGE: ${{ secrets.GCP_PROJECT_ID }}/gg-cms/backend

jobs:

  # ── Build and deploy backend to Cloud Run ──────────────────────────────────
  deploy-backend:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build backend image
        run: |
          docker build \
            --file=release/gcp/Dockerfile.cloudrun \
            --tag=${{ env.REGION }}-docker.pkg.dev/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --tag=${{ env.REGION }}-docker.pkg.dev/${{ env.BACKEND_IMAGE }}:latest \
            --cache-from=${{ env.REGION }}-docker.pkg.dev/${{ env.BACKEND_IMAGE }}:latest \
            gg-cms/backend/go-cms

      - name: Push backend image
        run: |
          docker push --all-tags \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.BACKEND_IMAGE }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gg-cms-backend \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --no-allow-unauthenticated \
            --set-secrets=JWT_SECRET=gg-cms-jwt-secret:latest,ADMIN_PASSWORD=gg-cms-admin-password:latest \
            --set-env-vars="\
              GIN_MODE=release,\
              TLS_ENABLED=false,\
              LOG_LEVEL=info,\
              MONGO_DATABASE=gg_cms,\
              DB_WRITE_URL=${{ secrets.CLOUDRUN_DB_WRITE_URL }},\
              MONGO_URI=${{ secrets.CLOUDRUN_MONGO_URI }},\
              ADMIN_EMAIL=admin@gg-cms.local"

      - name: Get Cloud Run URL
        run: |
          URL=$(gcloud run services describe gg-cms-backend \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Backend URL: $URL"
          echo "BACKEND_URL=$URL" >> $GITHUB_ENV

  # ── Build and deploy frontend to Firebase Hosting ─────────────────────────
  deploy-frontend:
    name: Frontend → Firebase
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gg-cms/frontend/react-ui/package-lock.json

      - name: Install dependencies
        working-directory: gg-cms/frontend/react-ui
        run: npm ci --silent

      - name: Build frontend
        working-directory: gg-cms/frontend/react-ui
        env:
          VITE_API_BASE_URL: /api
          VITE_APP_NAME: GeekGully CMS
          VITE_APP_ENV: production
          VITE_ENABLE_REGISTRATION: "true"
          VITE_ENABLE_SOCIAL_LOGIN: "false"
          VITE_ADMIN_GROUP_NAME: Admin
        run: npm run build

      - name: Copy Firebase config
        run: |
          cp release/gcp/firebase.json gg-cms/frontend/react-ui/firebase.json
          sed -i "s/YOUR_GCP_PROJECT_ID/${{ secrets.GCP_PROJECT_ID }}/g" \
            gg-cms/frontend/react-ui/firebase.json || true
          cat > gg-cms/frontend/react-ui/.firebaserc <<EOF
          { "projects": { "default": "${{ secrets.GCP_PROJECT_ID }}" } }
          EOF

      - name: Deploy to Firebase Hosting
        working-directory: gg-cms/frontend/react-ui
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx firebase-tools deploy --only hosting \
            --non-interactive \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --token "$FIREBASE_TOKEN"
