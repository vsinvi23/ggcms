# GG-CMS — Cloud Build CI/CD Pipeline
#
# Triggers on push to 'main' branch.
# Free quota: 120 build-minutes/day.
#
# What it does:
#   1. Build Go backend Docker image
#   2. Push to Artifact Registry (free 0.5 GB)
#   3. Deploy to Cloud Run (free 2M requests/month)
#   4. Build React frontend (npm run build)
#   5. Deploy to Firebase Hosting (free 10 GB/month)
#
# Setup (one-time):
#   gcloud builds triggers create github \
#     --name=gg-cms-deploy \
#     --repo-name=ggcms \
#     --repo-owner=vsinvi23 \
#     --branch-pattern=^main$ \
#     --build-config=release/gcp/cloudbuild.yaml \
#     --region=us-central1

steps:

  # ── Step 1: Build backend Docker image ──────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=release/gcp/Dockerfile.cloudrun
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/gg-cms/backend:${SHORT_SHA}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/gg-cms/backend:latest
      - --cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/gg-cms/backend:latest
      - gg-cms/backend/go-cms
    dir: .

  # ── Step 2: Push backend image to Artifact Registry ──────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/gg-cms/backend
    waitFor: [build-backend]

  # ── Step 3: Deploy backend to Cloud Run ─────────────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gg-cms-backend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/gg-cms/backend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --concurrency=80
      - --timeout=30
      - --no-allow-unauthenticated
      - --ingress=all
      # Secrets from Secret Manager
      - --set-secrets=JWT_SECRET=gg-cms-jwt-secret:latest,ADMIN_PASSWORD=gg-cms-admin-password:latest,POSTGRES_PASSWORD=gg-cms-pg-password:latest,MONGO_PASSWORD=gg-cms-mongo-password:latest
      # Non-secret env vars
      - --set-env-vars=GIN_MODE=release,TLS_ENABLED=false,LOG_LEVEL=info,MONGO_DATABASE=gg_cms,ADMIN_EMAIL=${_ADMIN_EMAIL},ADMIN_NAME=Super Admin,VITE_APP_NAME=GeekGully CMS
    waitFor: [push-backend]

  # ── Step 4: Build React frontend ─────────────────────────────────────────────
  - id: build-frontend
    name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - |
        cd gg-cms/frontend/react-ui
        npm ci --silent
        VITE_API_BASE_URL=/api \
        VITE_APP_NAME="GeekGully CMS" \
        VITE_APP_ENV=production \
        VITE_ENABLE_REGISTRATION=true \
        VITE_ENABLE_SOCIAL_LOGIN=false \
        npm run build
    dir: .
    waitFor: ['-']   # runs in parallel with backend build

  # ── Step 5: Deploy frontend to Firebase Hosting ──────────────────────────────
  - id: deploy-frontend
    name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - |
        npm install -g firebase-tools
        cp release/gcp/firebase.json gg-cms/frontend/react-ui/firebase.json
        cp release/gcp/.firebaserc   gg-cms/frontend/react-ui/.firebaserc
        cd gg-cms/frontend/react-ui
        firebase deploy --only hosting --non-interactive \
          --project ${PROJECT_ID} \
          --token $$FIREBASE_TOKEN
    secretEnv: [FIREBASE_TOKEN]
    waitFor: [build-frontend, deploy-backend]

# ── Substitutions (set in trigger or --substitutions flag) ────────────────────
substitutions:
  _REGION: us-central1
  _ADMIN_EMAIL: admin@gg-cms.local

# ── Secret references (for Firebase token) ────────────────────────────────────
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/firebase-ci-token/versions/latest
      env: FIREBASE_TOKEN

# ── Build options ─────────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM    # faster builds, still billed on build-minutes
  substitutionOption: ALLOW_LOOSE

timeout: 1200s
