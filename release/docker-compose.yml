name: gg-cms

# GG-CMS — Full-stack production deployment with mTLS
#
# Prerequisites:
#   bash certs/generate-certs.sh     (generates certs/ tree, run once)
#
# Quick start:
#   bash deploy.sh --build            (build from source then start)
#   bash deploy.sh --load             (load pre-built images from dist/ then start)
#
# With DB admin UI:
#   bash deploy.sh --build --with-tools
#
# Stop:  docker compose down
# Wipe:  docker compose down && rm -rf data/

services:

  # ── PostgreSQL 16 (TLS) ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gg-cms-postgres
    restart: unless-stopped
    user: root
    # Runs as root briefly to fix cert ownership, then drops to postgres (uid 70)
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp /pg-certs-ro/server.crt /pg-certs/server.crt
        cp /pg-certs-ro/server.key /pg-certs/server.key
        cp /pg-certs-ro/ca.crt     /pg-certs/ca.crt
        chown 70:70 /pg-certs/server.crt /pg-certs/server.key /pg-certs/ca.crt
        chmod 600 /pg-certs/server.key
        chmod 644 /pg-certs/server.crt /pg-certs/ca.crt
        exec su-exec postgres docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/pg-certs/server.crt \
          -c ssl_key_file=/pg-certs/server.key \
          -c ssl_ca_file=/pg-certs/ca.crt
    environment:
      POSTGRES_USER: gg_cms_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: gg_cms
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./certs/postgres:/pg-certs-ro:ro
      - pg_certs:/pg-certs
    networks:
      - gg-cms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gg_cms_user -d gg_cms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MongoDB 7 (mTLS) ─────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: gg-cms-mongodb
    restart: unless-stopped
    command:
      - mongod
      - --tlsMode
      - requireTLS
      - --tlsCertificateKeyFile
      - /certs/server.pem
      - --tlsCAFile
      - /certs/ca.crt
    environment:
      MONGO_INITDB_ROOT_USERNAME: gg_cms_user
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?Set MONGO_PASSWORD in .env}
      MONGO_INITDB_DATABASE: gg_cms
    volumes:
      - ./data/mongodb:/data/db
      - ./data/mongodb-config:/data/configdb
      - ./certs/mongodb:/certs:ro
    networks:
      - gg-cms-net
    healthcheck:
      test:
        - CMD
        - mongosh
        - --tls
        - --tlsCertificateKeyFile
        - /certs/server.pem
        - --tlsCAFile
        - /certs/ca.crt
        - --quiet
        - --eval
        - "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Go CMS Backend (HTTPS + mTLS) ────────────────────────────────────────────
  backend:
    build:
      context: ../gg-cms/backend/go-cms
      dockerfile: Dockerfile
    image: gg-cms-backend:latest
    container_name: gg-cms-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8443}:8443"
    environment:
      SERVER_PORT: "8443"
      GIN_MODE: release
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # PostgreSQL via TLS — pgx reads ssl* params from the URL directly
      DB_WRITE_URL: "postgres://gg_cms_user:${POSTGRES_PASSWORD}@postgres:5432/gg_cms?sslmode=verify-full&sslrootcert=/certs/ca/ca.crt&sslcert=/certs/backend/client.crt&sslkey=/certs/backend/client.key"
      DB_READ_URL: ${DB_READ_URL:-}

      # MongoDB via mTLS — Go driver picks up TLS config via SetTLSConfig()
      MONGO_URI: "mongodb://gg_cms_user:${MONGO_PASSWORD}@mongodb:27017/?authSource=admin&tls=true"
      MONGO_DATABASE: gg_cms

      # Backend TLS (HTTPS server + client cert verification of nginx)
      TLS_ENABLED: "true"
      TLS_CERT_FILE: /certs/backend/server.crt
      TLS_KEY_FILE: /certs/backend/server.key
      TLS_CA_FILE: /certs/ca/ca.crt
      TLS_CLIENT_CERT_FILE: /certs/backend/client.crt
      TLS_CLIENT_KEY_FILE: /certs/backend/client.key

      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}

      UPLOAD_DIR: /app/uploads
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-https://localhost/uploads}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost}

      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gg-cms.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      ADMIN_NAME: ${ADMIN_NAME:-Super Admin}
      # Secondary admin — leave GEEK_ADMIN_PASSWORD empty to disable
      GEEK_ADMIN_EMAIL: ${GEEK_ADMIN_EMAIL:-}
      GEEK_ADMIN_PASSWORD: ${GEEK_ADMIN_PASSWORD:-}
      GEEK_ADMIN_NAME: ${GEEK_ADMIN_NAME:-Geek Admin}

      FRONTEND_URL: ${FRONTEND_URL:-https://localhost}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URL: ${GITHUB_REDIRECT_URL:-}
    volumes:
      - ./data/uploads:/app/uploads
      - ./config/backend/app.env:/app/.env:ro
      - ./certs:/certs:ro
    networks:
      - gg-cms-net
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://localhost:8443/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── React Frontend — Nginx (HTTPS + mTLS proxy to backend) ───────────────────
  frontend:
    build:
      context: ../gg-cms/frontend/react-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_NAME: ${VITE_APP_NAME:-GeekGully CMS}
        VITE_APP_ENV: production
        VITE_ENABLE_REGISTRATION: ${VITE_ENABLE_REGISTRATION:-true}
        VITE_ENABLE_SOCIAL_LOGIN: ${VITE_ENABLE_SOCIAL_LOGIN:-false}
        VITE_ADMIN_GROUP_NAME: ${VITE_ADMIN_GROUP_NAME:-Admin}
    image: gg-cms-frontend:latest
    container_name: gg-cms-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_PORT_HTTPS:-443}:443"
    volumes:
      - ./config/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/certs:ro
    networks:
      - gg-cms-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── pgAdmin (optional — use --profile tools) ─────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gg-cms-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@gg-cms.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-Admin@123}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
    networks:
      - gg-cms-net
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

networks:
  gg-cms-net:
    driver: bridge

volumes:
  pg_certs:
