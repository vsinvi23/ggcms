# GG-CMS — Nginx config for native binary mode
# Nginx serves the pre-built React bundle from dist/frontend/.
# /api/* and /uploads/* are proxied to the Go binary running on the host (port 1337).
# Used with docker-compose.native.yml.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Proxy API to Go binary running on the Docker host
    # host.docker.internal resolves to the host machine's IP from within Docker
    location /api/ {
        proxy_pass http://host.docker.internal:1337/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  90s;
        proxy_connect_timeout 10s;
        client_max_body_size 50m;
    }

    location /uploads/ {
        proxy_pass http://host.docker.internal:1337/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|ico|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
