# GG-CMS — Nginx configuration (HTTPS + mTLS proxy to backend)
# Mounted at /etc/nginx/conf.d/default.conf inside the frontend container.
# Edit and restart to apply: docker compose restart frontend

upstream gg_cms_backend {
    server backend:8443;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Nginx server certificate (presented to browsers) ─────────────────────
    ssl_certificate     /certs/frontend/server.crt;
    ssl_certificate_key /certs/frontend/server.key;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;
    ssl_session_tickets       off;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── API proxy — mTLS to backend ───────────────────────────────────────────
    # nginx presents its client cert; backend verifies it against the CA.
    location /api/ {
        proxy_pass https://gg_cms_backend/api/;

        # mTLS: nginx client cert presented to backend
        proxy_ssl_certificate      /certs/frontend/client.crt;
        proxy_ssl_certificate_key  /certs/frontend/client.key;

        # Verify backend's server cert against internal CA
        proxy_ssl_trusted_certificate /certs/ca/ca.crt;
        proxy_ssl_verify           on;
        proxy_ssl_protocols        TLSv1.2 TLSv1.3;
        proxy_ssl_server_name      on;

        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
        client_max_body_size  50m;
    }

    # ── Uploaded files proxy — mTLS to backend ────────────────────────────────
    location /uploads/ {
        proxy_pass https://gg_cms_backend/uploads/;

        proxy_ssl_certificate      /certs/frontend/client.crt;
        proxy_ssl_certificate_key  /certs/frontend/client.key;
        proxy_ssl_trusted_certificate /certs/ca/ca.crt;
        proxy_ssl_verify           on;
        proxy_ssl_protocols        TLSv1.2 TLSv1.3;

        proxy_http_version  1.1;
        proxy_set_header    Host      $host;
        proxy_set_header    X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Static assets — Vite-hashed filenames, long-lived cache ──────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|ico|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA catch-all ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
